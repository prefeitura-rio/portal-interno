name: Deploy to Staging with Blue-Green

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    needs: []
    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check if k8s-only changes
        id: check-k8s-only
        run: |
          CHANGED_FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }})
          NON_K8S_FILES=$(echo "$CHANGED_FILES" | grep -v "^k8s/" || true)
          if [ -z "$NON_K8S_FILES" ] && [ -n "$CHANGED_FILES" ]; then
            echo "k8s_only=true" >> $GITHUB_OUTPUT
            echo "Only k8s/ files changed, skipping build and deploy"
          else
            echo "k8s_only=false" >> $GITHUB_OUTPUT
            echo "Non-k8s files changed, proceeding with build and deploy"
          fi

      - name: Set up Docker Buildx
        if: steps.check-k8s-only.outputs.k8s_only != 'true'
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: steps.check-k8s-only.outputs.k8s_only != 'true'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u $GITHUB_ACTOR --password-stdin

      - name: Build and Push Docker Image (Staging)
        if: steps.check-k8s-only.outputs.k8s_only != 'true'
        run: |
          COMMIT_HASH=${{ github.sha }}
          SHORT_HASH=$(git rev-parse --short HEAD)
          IMAGE_NAME="ghcr.io/${{ github.repository_owner }}/portal-interno"

          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV
          echo "COMMIT_HASH=$COMMIT_HASH" >> $GITHUB_ENV
          echo "SHORT_HASH=$SHORT_HASH" >> $GITHUB_ENV

          docker buildx build \
            --platform linux/amd64 \
            --build-arg NEXT_PUBLIC_IDENTIDADE_CARIOCA_BASE_URL="https://auth-idriohom.apps.rio.gov.br/auth/realms/idrio_cidadao/protocol/openid-connect" \
            --build-arg NEXT_PUBLIC_IDENTIDADE_CARIOCA_CLIENT_ID="superapp" \
            --build-arg NEXT_PUBLIC_IDENTIDADE_CARIOCA_REDIRECT_URI="https://admin.staging.app.dados.rio/api/auth/callback/keycloak" \
            --build-arg NEXT_PUBLIC_GOVBR_BASE_URL="https://sso.staging.acesso.gov.br/" \
            --build-arg NEXT_PUBLIC_COURSES_BASE_API_URL="https://services.staging.app.dados.rio/go" \
            --build-arg NEXT_PUBLIC_BUSCA_SEARCH_API_URL="https://services.staging.app.dados.rio/app-busca-search" \
            --build-arg NEXT_PUBLIC_HEIMDALL_BASE_API_URL="https://services.staging.app.dados.rio/heimdall-admin" \
            --build-arg NEXT_PUBLIC_RMI_BASE_API_URL="https://services.staging.app.dados.rio/rmi/v1" \
            --build-arg NEXT_PUBLIC_BUSCA_1746_COLLECTION=1746_v2_llm \
            --build-arg NEXT_PUBLIC_BUSCA_CARIOCA_DIGITAL_COLLECTION=carioca-digital_v2_llm \
            --build-arg NEXT_PUBLIC_INSTITUICAO_ID_DEFAULT=5 \
            --build-arg NEXT_PUBLIC_FEATURE_FLAG=false \
            --build-arg NEXT_PUBLIC_BASE_URL_APP="https://staging.app.dados.rio" \
            --build-arg NEXT_PUBLIC_ENVIRONMENT="staging" \
            --tag $IMAGE_NAME:latest \
            --tag $IMAGE_NAME:$COMMIT_HASH \
            --push .

      - name: Get image digest
        if: steps.check-k8s-only.outputs.k8s_only != 'true'
        run: |
          DIGEST=$(docker buildx imagetools inspect $IMAGE_NAME:latest --format '{{.Manifest.Digest}}' | grep -oE 'sha256:[a-f0-9]+' | head -n1)
          echo "DIGEST=$DIGEST" >> $GITHUB_ENV

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Install gke-gcloud-auth-plugin
        run: gcloud components install gke-gcloud-auth-plugin

      - name: Install kubectl
        uses: azure/setup-kubectl@v5
        with:
          version: latest

      - name: Install Argo Rollouts kubectl plugin
        run: |
          curl -fLO https://github.com/argoproj/argo-rollouts/releases/latest/download/kubectl-argo-rollouts-linux-amd64
          chmod +x ./kubectl-argo-rollouts-linux-amd64
          sudo mv ./kubectl-argo-rollouts-linux-amd64 /usr/local/bin/kubectl-argo-rollouts

      - name: Configure kubectl for GKE (Staging)
        run: gcloud container clusters get-credentials --dns-endpoint application --zone=us-central1 --project="${{ vars.GCP_PROJECT_ID }}"

      - name: Update ArgoCD Application image override
        if: steps.check-k8s-only.outputs.k8s_only != 'true'
        run: |
          kubectl patch application portal-interno -n argocd --type=merge \
            -p="{\"spec\":{\"source\":{\"kustomize\":{\"images\":[\"$IMAGE_NAME:$COMMIT_HASH@$DIGEST\"]}}}}"
          echo "✅ ArgoCD Application updated"

      - name: Wait for ArgoCD sync and blue-green preview
        if: steps.check-k8s-only.outputs.k8s_only != 'true'
        timeout-minutes: 10
        run: |
          echo "Waiting for ArgoCD to sync and create blue-green preview..."
          echo "Expected image: $IMAGE_NAME:$COMMIT_HASH@$DIGEST"

          for i in {1..60}; do
            CURRENT_IMAGE=$(kubectl get rollout portal-interno -n portal-interno -o jsonpath='{.spec.template.spec.containers[0].image}')
            SYNC_STATUS=$(kubectl get application portal-interno -n argocd -o jsonpath='{.status.sync.status}')

            echo "Attempt $i/60: Image=$CURRENT_IMAGE, ArgoCD Sync=$SYNC_STATUS"

            if [[ "$CURRENT_IMAGE" == "$IMAGE_NAME:$COMMIT_HASH@$DIGEST" ]]; then
              echo "✅ Rollout spec updated with new image!"
              break
            fi

            if [ $i -eq 60 ]; then
              echo "❌ Timeout waiting for rollout image update"
              echo "Expected: $IMAGE_NAME:$COMMIT_HASH@$DIGEST"
              echo "Got: $CURRENT_IMAGE"
              kubectl get application portal-interno -n argocd -o yaml
              kubectl get rollout portal-interno -n portal-interno -o yaml
              exit 1
            fi

            sleep 5
          done

          echo "Waiting for rollout to reach Paused phase (preview healthy)..."
          for i in {1..60}; do
            PHASE=$(kubectl get rollout portal-interno -n portal-interno -o jsonpath='{.status.phase}' 2>/dev/null || echo "")
            echo "Attempt $i/60: Rollout phase=$PHASE"
            if [ "$PHASE" = "Paused" ]; then
              echo "✅ Preview is healthy and ready to promote"
              break
            fi
            if [ "$PHASE" = "Degraded" ] || [ "$PHASE" = "Aborted" ]; then
              echo "❌ Rollout entered $PHASE state"
              kubectl argo rollouts get rollout portal-interno -n portal-interno
              exit 1
            fi
            if [ $i -eq 60 ]; then
              echo "Timeout waiting for rollout to reach Paused state"
              kubectl argo rollouts get rollout portal-interno -n portal-interno
              exit 1
            fi
            sleep 5
          done

          kubectl argo rollouts get rollout portal-interno -n portal-interno

      # E2E tests temporarily disabled — re-enable once tests are stable

      - name: Promote to active
        if: steps.check-k8s-only.outputs.k8s_only != 'true' && success()
        run: |
          echo "✅ Preview healthy — promoting to active..."
          kubectl argo rollouts promote portal-interno -n portal-interno
          kubectl argo rollouts status portal-interno -n portal-interno --timeout=5m

      - name: Abort on failure
        if: steps.check-k8s-only.outputs.k8s_only != 'true' && failure()
        run: |
          echo "❌ Aborting rollout..."
          kubectl argo rollouts abort portal-interno -n portal-interno || true
          echo "Rollout aborted. Preview discarded. Active service unchanged."
          exit 1

      - name: Create deployment summary
        if: always() && steps.check-k8s-only.outputs.k8s_only != 'true'
        run: |
          echo "## 🚀 Staging Deployment" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: ${SHORT_HASH}" >> $GITHUB_STEP_SUMMARY
          echo "**Image**: \`${IMAGE_NAME}:${COMMIT_HASH}\`" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" = "success" ]; then
            echo "### ✅ Deployed and promoted to active" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Deployment failed — rollout aborted, active service unchanged" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Send Discord notification
        if: always() && steps.check-k8s-only.outputs.k8s_only != 'true'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          [ -z "$DISCORD_WEBHOOK" ] && echo "No webhook configured" && exit 0
          COMMIT_MSG=$(git log -1 --pretty=format:'%s' ${{ github.sha }})
          COMMIT_AUTHOR=$(git log -1 --pretty=format:'%an' ${{ github.sha }})
          COMMIT_URL="https://github.com/${{ github.repository }}/commit/${{ github.sha }}"
          if [ "${{ job.status }}" = "success" ]; then
            EMOJI="✅"; TEXT="Succeeded"; COLOR="3066993"
            DESC="Health check passed and deployment promoted to active service."
          else
            EMOJI="❌"; TEXT="Failed"; COLOR="15158332"
            DESC="Health check failed. Rollout aborted. Active service unchanged."
          fi
          curl -sf -H "Content-Type: application/json" -d "{
            \"embeds\": [{
              \"title\": \"${EMOJI} Staging Deploy ${TEXT} — portal-interno\",
              \"description\": \"${DESC}\",
              \"color\": ${COLOR},
              \"fields\": [
                {\"name\": \"Commit\", \"value\": \"[${COMMIT_MSG:0:50}](${COMMIT_URL})\", \"inline\": false},
                {\"name\": \"Author\", \"value\": \"${COMMIT_AUTHOR}\", \"inline\": true},
                {\"name\": \"Hash\", \"value\": \"\`${SHORT_HASH}\`\", \"inline\": true}
              ]
            }]
          }" "$DISCORD_WEBHOOK" || true