name: PR Quality Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

jobs:
  lint:
    name: Lint, Typecheck and Dockerfile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Biome (lint + format check)
        run: npm run lint

      - name: Run TypeScript type check
        run: npx tsc --noEmit

      - name: Run Hadolint (Dockerfile linter)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy (filesystem scan)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  build:
    name: Docker Build Dry Run
    runs-on: ubuntu-latest
    needs: [lint, security-scan]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image (dry run — staging args)
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --build-arg NEXT_PUBLIC_IDENTIDADE_CARIOCA_BASE_URL="https://auth-idriohom.apps.rio.gov.br/auth/realms/idrio_cidadao/protocol/openid-connect" \
            --build-arg NEXT_PUBLIC_IDENTIDADE_CARIOCA_CLIENT_ID="superapp" \
            --build-arg NEXT_PUBLIC_IDENTIDADE_CARIOCA_REDIRECT_URI="https://admin.staging.app.dados.rio/api/auth/callback/keycloak" \
            --build-arg NEXT_PUBLIC_GOVBR_BASE_URL="https://sso.staging.acesso.gov.br/" \
            --build-arg NEXT_PUBLIC_COURSES_BASE_API_URL="https://services.staging.app.dados.rio/go" \
            --build-arg NEXT_PUBLIC_BUSCA_SEARCH_API_URL="https://services.staging.app.dados.rio/app-busca-search" \
            --build-arg NEXT_PUBLIC_HEIMDALL_BASE_API_URL="https://services.staging.app.dados.rio/heimdall-admin" \
            --build-arg NEXT_PUBLIC_RMI_BASE_API_URL="https://services.staging.app.dados.rio/rmi/v1" \
            --build-arg NEXT_PUBLIC_BUSCA_1746_COLLECTION=1746_v2_llm \
            --build-arg NEXT_PUBLIC_BUSCA_CARIOCA_DIGITAL_COLLECTION=carioca-digital_v2_llm \
            --build-arg NEXT_PUBLIC_INSTITUICAO_ID_DEFAULT=5 \
            --build-arg NEXT_PUBLIC_FEATURE_FLAG=false \
            --build-arg NEXT_PUBLIC_BASE_URL_APP="https://staging.app.dados.rio" \
            --tag ghcr.io/${{ github.repository_owner }}/portal-interno:pr-${{ github.event.pull_request.number }} \
            --load \
            .

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/${{ github.repository_owner }}/portal-interno:pr-${{ github.event.pull_request.number }}'
          format: 'sarif'
          output: 'trivy-image-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy image scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-image-results.sarif'

  summary:
    name: Quality Gate Summary
    runs-on: ubuntu-latest
    needs: [lint, security-scan, build]
    if: always()
    permissions:
      pull-requests: write
    steps:
      - name: Find previous quality gate comment
        uses: peter-evans/find-comment@v2
        id: find-comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '🚦 PR Quality Gate'

      - name: Create or update PR comment
        uses: peter-evans/create-or-update-comment@v3
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: replace
          body: |
            ## 🚦 PR Quality Gate

            | Check | Status |
            |-------|--------|
            | Lint + Typecheck + Dockerfile | ${{ needs.lint.result == 'success' && '✅ Passed' || needs.lint.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |
            | Security Scanning | ${{ needs.security-scan.result == 'success' && '✅ Passed' || needs.security-scan.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |
            | Docker Build | ${{ needs.build.result == 'success' && '✅ Passed' || needs.build.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |

            ---

            ${{ needs.lint.result == 'success' && needs.security-scan.result == 'success' && needs.build.result == 'success' && '### ✅ All checks passed — PR is ready to merge' || '### ❌ Quality gate failed — PR is not ready to merge' }}

            **Commit**: ${{ github.event.pull_request.head.sha }}
            **Run**: [View Details](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

      - name: Fail if any check failed
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.security-scan.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ]; then
            exit 1
          fi
