---
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: portal-interno
  annotations:
    secrets.infisical.com/auto-reload: "true"
spec:
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: portal-interno
  strategy:
    canary:
      canaryService: portal-interno-canary
      stableService: portal-interno
      trafficRouting:
        istio:
          virtualService:
            name: portal-interno-virtual-service
            namespace: istio-system
            routes:
              - primary
      analysis:
        templates:
          - templateName: portal-interno-success-rate
        startingStep: 2
        args:
          - name: service-name
            value: portal-interno-canary
      steps:
        - setWeight: 10
        - pause: {duration: 2m}
        - setWeight: 20
        - pause: {duration: 3m}
        - setWeight: 40
        - pause: {duration: 5m}
        - setWeight: 60
        - pause: {duration: 5m}
        - setWeight: 80
        - pause: {duration: 5m}
      maxSurge: "25%"
      maxUnavailable: 0
      abortScaleDownDelaySeconds: 30
  template:
    metadata:
      labels:
        app: portal-interno
    spec:
      containers:
        - name: portal-interno
          image: ghcr.io/prefeitura-rio/portal-interno:stable  # Updated by release workflow
          envFrom:
            - secretRef:
                name: portal-interno-secrets
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 24
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 2Gi
      restartPolicy: Always

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: portal-interno-pdb
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: portal-interno

---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: portal-interno
  name: portal-interno
spec:
  ports:
    - name: "80"
      port: 80
      targetPort: 3000
  selector:
    app: portal-interno

---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: portal-interno
  name: portal-interno-canary
spec:
  ports:
    - name: "80"
      port: 80
      targetPort: 3000
  selector:
    app: portal-interno

---
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: portal-interno-success-rate
spec:
  args:
    - name: service-name
  metrics:
    - name: success-rate
      interval: 1m
      successCondition: result[0] >= 0.95
      failureLimit: 5
      provider:
        prometheus:
          address: http://prometheus.istio-system.svc.cluster.local:9090
          query: |
            (sum(rate(istio_requests_total{destination_service_name=~"{{args.service-name}}",response_code!~"5.."}[2m])) or vector(0)) / (sum(rate(istio_requests_total{destination_service_name=~"{{args.service-name}}"}[2m])) > 0) or vector(1)
    - name: error-rate
      interval: 1m
      successCondition: result[0] <= 0.05
      failureLimit: 5
      provider:
        prometheus:
          address: http://prometheus.istio-system.svc.cluster.local:9090
          query: |
            (sum(rate(istio_requests_total{destination_service_name=~"{{args.service-name}}",response_code=~"5.."}[2m])) or vector(0)) / (sum(rate(istio_requests_total{destination_service_name=~"{{args.service-name}}"}[2m])) > 0) or vector(0)
